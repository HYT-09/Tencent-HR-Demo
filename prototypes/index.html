<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>腾讯校园招聘 App 高保真原型</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      color: white;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
    }

    /* Section */
    .section {
      max-width: 1600px;
      margin: 0 auto 50px;
    }

    .section-title {
      color: white;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-left: 10px;
      border-left: 4px solid #2A5CFF;
    }

    /* Phone Grid */
    .phone-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
    }

    /* Phone Wrapper */
    .phone-wrapper {
      position: relative;
    }

    .phone-label {
      position: absolute;
      bottom: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 600;
      color: white;
      background: rgba(42, 92, 255, 0.8);
      padding: 6px 16px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .phone-label-hr {
      background: rgba(42, 92, 255, 0.8);
    }

    .phone-label-admin {
      background: rgba(42, 92, 255, 0.8);
    }

    /* Phone Frame */
    .phone-frame {
      width: 393px;
      height: 852px;
      background: #ffffff;
      border-radius: 47px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 12px #1a1a1a,
        0 0 0 14px #333,
        0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .phone-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Desktop Frame */
    .desktop-frame {
      width: 100%;
      max-width: 1200px;
      height: 700px;
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .desktop-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 30px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }

    .footer a {
      color: #2A5CFF;
      text-decoration: none;
    }

    /* Navigation Pills */
    .nav-pills {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .nav-pill {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }

    .nav-pill:hover {
      background: rgba(230, 67, 64, 0.8);
    }

    .nav-pill.active {
      background: #2A5CFF;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .phone-frame {
        width: 320px;
        height: 694px;
        border-radius: 36px;
      }

      .header h1 {
        font-size: 24px;
      }

      .section-title {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1><i class="fas fa-briefcase" style="color: #2A5CFF; margin-right: 12px;"></i>腾讯校园招聘 App</h1>
    <p>高保真原型设计 · 用户端 / HR端 / 运营后台</p>
  </div>

  <!-- Navigation -->
  <div class="nav-pills">
    <a href="#user" class="nav-pill active">用户端</a>
    <a href="#hr" class="nav-pill">HR端</a>
    <a href="#admin" class="nav-pill">运营后台</a>
  </div>

  <!-- User Section -->
  <div class="section" id="user">
    <h2 class="section-title">用户端（小程序/APP）</h2>
    <div class="phone-grid">
      <div class="phone-wrapper">
        <div class="phone-frame">
          <iframe src="user/home.html" title="首页"></iframe>
        </div>
        <span class="phone-label">首页</span>
      </div>

      <div class="phone-wrapper">
        <div class="phone-frame">
          <iframe src="user/resume_upload.html" title="简历上传"></iframe>
        </div>
        <span class="phone-label">简历上传</span>
      </div>

      <div class="phone-wrapper">
        <div class="phone-frame">
          <iframe src="user/matching_result.html" title="匹配结果"></iframe>
        </div>
        <span class="phone-label">匹配结果</span>
      </div>

      <div class="phone-wrapper">
        <div class="phone-frame">
          <iframe src="user/job_progress.html" title="求职进度"></iframe>
        </div>
        <span class="phone-label">求职进度看板</span>
      </div>

      <div class="phone-wrapper">
        <div class="phone-frame">
          <iframe src="user/user_center.html" title="个人中心"></iframe>
        </div>
        <span class="phone-label">个人中心</span>
      </div>

      <div class="phone-wrapper">
        <div class="phone-frame">
          <iframe src="user/apply.html" title="投递管理"></iframe>
        </div>
        <span class="phone-label">投递管理</span>
      </div>
    </div>
  </div>

  <!-- HR Section -->
  <div class="section" id="hr">
    <h2 class="section-title">HR端</h2>
    <div class="phone-grid">
      <div class="phone-wrapper">
        <div class="phone-frame">
          <iframe src="hr/hr_dashboard.html" title="HR工作台"></iframe>
        </div>
        <span class="phone-label phone-label-hr">HR工作台</span>
      </div>

      <div class="phone-wrapper">
        <div class="phone-frame">
          <iframe src="hr/hr_candidate_list.html" title="候选人列表"></iframe>
        </div>
        <span class="phone-label phone-label-hr">候选人列表</span>
      </div>

      <div class="phone-wrapper">
        <div class="phone-frame">
          <iframe src="hr/hr_reject_pool.html" title="候选人回捞"></iframe>
        </div>
        <span class="phone-label phone-label-hr">候选人回捞</span>
      </div>
    </div>
  </div>

  <!-- Admin Section -->
  <div class="section" id="admin">
    <h2 class="section-title">运营后台</h2>
    <div class="desktop-frame">
      <iframe src="admin/admin_dashboard.html" title="运营后台"></iframe>
    </div>
    <div style="text-align: center; margin-top: 20px;">
      <span class="phone-label phone-label-admin" style="position: static; transform: none;">运营后台管理系统</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>腾讯校园招聘 App 高保真原型 · 基于 iPhone 15 Pro 设计规范</p>
    <p style="margin-top: 8px;">使用 HTML + CSS + FontAwesome 构建 · 可直接用于开发参考</p>
  </div>

  <script>
    // Smooth scroll for navigation
    document.querySelectorAll('.nav-pill').forEach(pill => {
      pill.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        // Update active state
        document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
